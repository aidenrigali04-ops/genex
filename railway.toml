# Pins the start process so Railway does not rely on a custom dashboard command
# like `npm run start:api` (which breaks if an older commit is deployed).
#
# Railpack build: if you see `failed to stat .../secrets/VAR_NAME`, Railway expects that
# variable as a build-time secret. Fix: Service → Variables → add VAR_NAME (e.g.
# NEXT_PUBLIC_GENEX_UNLIMITED_CREDITS=0), or remove VAR_NAME from shared / referenced vars.
[deploy]
startCommand = "npm start"

# Primary: source clipping (`video_jobs`) — same worker: OPENAI_API_KEY, SUPABASE_* , ffmpeg in image.
# Secondary: text→video (`text_video_jobs`) in the same `worker.js` tick unless ENABLE_TEXT_VIDEO_JOBS=0.
# For text→video on the worker: PEXELS_API_KEY, ELEVENLABS_API_KEY, ELEVENLABS_VOICE_ID (mirror ENABLE_TEXT_VIDEO_JOBS on Next if you disable the API).
# Optional second service: root `worker`, `node text-video-worker.js`, worker/Dockerfile (ffmpeg).
#
# [[services]]
# name = "text-video-worker"
# rootDirectory = "worker"
# startCommand = "node text-video-worker.js"
