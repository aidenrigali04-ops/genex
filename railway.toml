# Pins the start process so Railway does not rely on a custom dashboard command
# like `npm run start:api` (which breaks if an older commit is deployed).
#
# Railpack runs `npm ci` at the service Root Directory. Leave Root Directory empty (repo
# root) so `package-lock.json` next to `package.json` is used — a subfolder without the
# lockfile will fail with "package.json and package-lock.json … not in sync".
#
# Railpack apt: `railpack.json` installs libatomic1 (build + runtime) for native deps
# (e.g. sharp / prisma). Override with service vars RAILPACK_BUILD_APT_PACKAGES /
# RAILPACK_DEPLOY_APT_PACKAGES if needed.
#
# If `npm ci` fails with "Missing: stripe@… from lock file" on deploy, the build context
# may be wrong or an old tree is cached. `.dockerignore` omits worker/package*.json so
# only the app lockfile is used. As a last resort set a Railway variable:
# RAILPACK_INSTALL_CMD=npm install --omit=dev --no-audit --no-fund
#
# Do not set `packageManager` in package.json for Railpack: it enables Corepack and the
# builder image may error with `lstat /opt/corepack: no such file or directory`.
#
[build]
builder = "RAILPACK"

# Railpack build: if you see `failed to stat .../secrets/VAR_NAME`, Railway expects that
# variable as a build-time secret. Fix: Service → Variables → add VAR_NAME (e.g.
# NEXT_PUBLIC_GENEX_UNLIMITED_CREDITS=0), or remove VAR_NAME from shared / referenced vars.
[deploy]
startCommand = "npm start"

# Primary: source clipping (`video_jobs`) — same worker: OPENAI_API_KEY, SUPABASE_* , ffmpeg in image.
# Secondary: text→video (`text_video_jobs`) in the same `worker.js` tick unless ENABLE_TEXT_VIDEO_JOBS=0.
# For text→video on the worker: PEXELS_API_KEY, ELEVENLABS_API_KEY, ELEVENLABS_VOICE_ID (mirror ENABLE_TEXT_VIDEO_JOBS on Next if you disable the API).
# Optional second service: root `worker`, `node text-video-worker.js`, worker/Dockerfile (ffmpeg).
#
# [[services]]
# name = "text-video-worker"
# rootDirectory = "worker"
# startCommand = "node text-video-worker.js"
